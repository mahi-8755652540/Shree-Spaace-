<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Job Application | Shree Spaace Solution</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family: Arial, sans-serif;
  background:#f3f4f6;
  padding:20px;
}
.form-box{
  max-width:500px;
  background:#fff;
  margin:auto;
  padding:20px;
  border-radius:8px;
  box-shadow:0 10px 25px rgba(0,0,0,0.12);
}
h2{text-align:center;margin-bottom:15px;}
label{font-weight:600;display:block;margin-top:12px;}
input,select,textarea{
  width:100%;
  padding:8px;
  margin-top:5px;
  border:1px solid #ccc;
  border-radius:4px;
}
button{
  margin-top:20px;
  width:100%;
  padding:10px;
  font-size:16px;
  background:#c9a456;
  border:none;
  cursor:pointer;
  font-weight:600;
}
</style>
</head>

<body>

<div class="form-box">
  <h2>Job Application</h2>

  <form id="jobForm">
    <label>Full Name *</label>
    <input type="text" name="fullName" required>

    <label>Mobile *</label>
    <input type="text" name="mobile" required>

    <label>Email *</label>
    <input type="email" name="email" required>

    <label>City *</label>
    <input type="text" name="city" required>

    <label>Post Applied For *</label>
    <select name="post" required>
      <option value="">Select</option>
      <option>Site Engineer</option>
      <option>Architect</option>
      <option>Interior Designer</option>
      <option>Site Supervisor</option>
      <option>Accounts Executive</option>
    </select>

    <label>Experience *</label>
    <select name="experience" required>
      <option value="">Select</option>
      <option>Fresher</option>
      <option>1–2 Years</option>
      <option>2–5 Years</option>
      <option>5+ Years</option>
    </select>

    <label>Expected Salary</label>
    <input type="text" name="salary">

    <label>Skills</label>
    <textarea name="skills"></textarea>

    <button type="submit">Submit Application</button>
  </form>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbynAmwDFerK6bPD7441ki2VzCYyQA5YqPQDkM12Evys3U1lWSv1EkruDl-8OU6xFNG_4Q/exec";
const form = document.getElementById("jobForm");

form.addEventListener("submit", function(e){
  e.preventDefault();

  fetch(scriptURL, {
    method: "POST",
    body: new FormData(form),
    mode: "no-cors"
  });

  alert("Application submitted successfully!");
  form.reset();
});
</script>

</body>
</html>
